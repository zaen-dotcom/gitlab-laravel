name: Deploy Laravel
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: chnoxi
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/html/gitlab-laravel
            git pull origin main
            composer install
            php artisan migrate --force
