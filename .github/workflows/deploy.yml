name: Deploy Laravel
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Jalankan Deploy Script di Fedora
        run: |
          # Masuk ke folder proyek di home kamu
          cd /home/chnoxi/gitlab-laravel || exit
          
          # Jalankan perintah deploy standar
          git pull origin main
          composer install --no-dev
          php artisan migrate --force